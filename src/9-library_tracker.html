<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main>
      <div class="container">
        <h1 class="main-title">
          <span class="main-title-gradient">Welcome</span> to the Feedback Form
        </h1>
        <a class="back-link" href="./index.html">Go back</a>
      </div>

      <div class="container">
        <form class="js-book-form book-form">
          <input type="text" name="title" placeholder="Book title" />

          <input type="text" name="author" placeholder="Author" />

          <select name="status">
            <option value="Read">Read</option>

            <option value="Reading">Reading</option>

            <option value="Planned">Planned</option>
          </select>

          <button type="submit">Add Book</button>
        </form>
        <input
          class="js-search-book"
          type="text"
          placeholder="Search by title"
        />

        <select class="js-filter-status">
          <option value="All">All</option>
          <option value="Read">Read</option>
          <option value="Reading">Reading</option>
          <option value="Planned">Planned</option>
        </select>

        <button class="js-clear-all-books" type="button">Clear All</button>

        <ul class="js-book-list book-list"></ul>
      </div>
    </main>
    <script
      type="module"
      src="./js/9-library_tracker/main-9-library_tracker.js"
    ></script>
  </body>
</html>
