<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main>
      <div class="container">
        <h1 class="main-title">
          <span class="main-title-gradient">Welcome</span> to the Feedback Form
        </h1>
        <a class="back-link" href="./index.html">Go back</a>
      </div>

      <div class="container">
        <form class="js-note-form note-form">
          <input type="text" name="note" placeholder="Enter note" />

          <button type="submit">Add Note</button>
        </form>
        <input type="text" class="js-search-note" placeholder="Search notes" />

        <button class="js-clear-all-notes" type="button">Clear All</button>
        <ul class="js-notes-list"></ul>
      </div>
    </main>
    <script
      type="module"
      src="./js/6-notes_app_pro/main-6-notes_app_pro.js"
    ></script>
  </body>
</html>
